<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giá Vàng AI — AgentBase</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #0f0e0c;
      --panel: #1a1814;
      --card: #242019;
      --gold: #d4a853;
      --gold-light: #f0d78c;
      --text: #f5f0e6;
      --muted: #a89b84;
      --border: #3a3428;
      --danger: #e57373;
      --ok: #81c784;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(ellipse at top, #2a2218 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 24px 16px 48px; }
    header { text-align: center; margin-bottom: 28px; }
    header h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p { margin: 0; color: var(--muted); font-size: 0.95rem; }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }
    .card h3 { margin: 0 0 12px; color: var(--gold-light); font-size: 1rem; }
    .price-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .price-row:last-child { border-bottom: none; }
    .price-row span:last-child { color: var(--gold); font-weight: 600; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 20px;
    }
    .panel h2 { margin: 0 0 14px; font-size: 1.1rem; color: var(--gold-light); }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .chip {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: border-color 0.15s, color 0.15s;
    }
    .chip:hover { border-color: var(--gold); color: var(--gold-light); }
    textarea {
      width: 100%;
      min-height: 80px;
      resize: vertical;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: 12px;
      font: inherit;
    }
    .actions { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
    button {
      background: linear-gradient(135deg, #b8862e, var(--gold));
      color: #1a1408;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      font-weight: 600;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .status {
      margin-top: 10px;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .status.error { color: var(--danger); }
    .status.ok { color: var(--ok); }
    #analysis {
      line-height: 1.65;
      font-size: 0.95rem;
    }
    #analysis h1, #analysis h2, #analysis h3 { color: var(--gold-light); margin-top: 1.2em; }
    #analysis table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      font-size: 0.88rem;
    }
    #analysis th, #analysis td {
      border: 1px solid var(--border);
      padding: 8px 10px;
      text-align: left;
    }
    #analysis th { background: var(--card); color: var(--gold-light); }
    .placeholder { color: var(--muted); font-style: italic; }
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Giá Vàng AI</h1>
      <p>Agent phân tích giá vàng SJC · DOJI · PNJ trên GreenNode AgentBase</p>
    </header>

    <section class="cards" id="price-cards">
      <div class="card"><p class="placeholder">Đang tải giá...</p></div>
    </section>

    <section class="panel">
      <h2>Phân tích AI</h2>
      <div class="chips">
        <button type="button" class="chip" data-prompt="Phân tích giá vàng SJC hôm nay">SJC hôm nay</button>
        <button type="button" class="chip" data-prompt="So sánh giá vàng SJC, DOJI và PNJ">So sánh 3 nguồn</button>
        <button type="button" class="chip" data-prompt="Đánh giá spread mua bán vàng miếng SJC">Spread mua-bán</button>
        <button type="button" class="chip" data-prompt="Tóm tắt xu hướng giá vàng Việt Nam hiện tại">Xu hướng</button>
      </div>
      <textarea id="prompt" placeholder="Nhập câu hỏi phân tích giá vàng..."></textarea>
      <div class="actions">
        <button id="analyze-btn" type="button">Phân tích</button>
        <button id="refresh-btn" type="button" class="secondary">Làm mới giá</button>
      </div>
      <div class="status" id="status"></div>
    </section>

    <section class="panel">
      <h2>Kết quả</h2>
      <div id="analysis" class="placeholder">Chọn gợi ý hoặc nhập câu hỏi để bắt đầu.</div>
    </section>

    <footer>Thông tin tham khảo — không phải lời khuyên đầu tư</footer>
  </div>

  <script>
    const cardsEl = document.getElementById("price-cards");
    const promptEl = document.getElementById("prompt");
    const statusEl = document.getElementById("status");
    const analysisEl = document.getElementById("analysis");
    const analyzeBtn = document.getElementById("analyze-btn");
    const refreshBtn = document.getElementById("refresh-btn");

    function setStatus(text, type = "") {
      statusEl.textContent = text;
      statusEl.className = "status " + type;
    }

    function renderCard(quote) {
      const rows = Object.entries(quote.formatted || {})
        .map(([k, v]) => `<div class="price-row"><span>${k}</span><span>${v}</span></div>`)
        .join("");
      const body = rows || `<p class="placeholder">${quote.error || "Không có dữ liệu"}</p>`;
      return `<div class="card"><h3>${quote.label || quote.source}</h3>${body}</div>`;
    }

    async function loadPrices() {
      cardsEl.innerHTML = '<div class="card"><p class="placeholder">Đang tải giá...</p></div>';
      try {
        const res = await fetch("/api/quotes?source=all");
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        const quotes = data.quotes || [];
        if (!quotes.length) throw new Error("Không có dữ liệu giá");
        cardsEl.innerHTML = quotes.map(renderCard).join("");
        if (data.errors?.length) {
          setStatus("Một số nguồn lỗi: " + data.errors.map(e => e.source).join(", "), "error");
        }
      } catch (err) {
        cardsEl.innerHTML = `<div class="card"><p class="placeholder">Lỗi: ${err.message}</p></div>`;
      }
    }

    async function analyze(message) {
      if (!message.trim()) return;
      analyzeBtn.disabled = true;
      setStatus("AI đang phân tích (có thể mất 20–40 giây)...");
      analysisEl.className = "placeholder";
      analysisEl.textContent = "Đang xử lý...";

      try {
        const res = await fetch("/invocations", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });
        const data = await res.json();
        if (data.status === "error") throw new Error(data.message || "Lỗi không xác định");
        analysisEl.className = "";
        analysisEl.innerHTML = marked.parse(data.analysis || "");
        setStatus("Cập nhật lúc " + new Date(data.timestamp || Date.now()).toLocaleString("vi-VN"), "ok");
      } catch (err) {
        analysisEl.className = "placeholder";
        analysisEl.textContent = err.message;
        setStatus(err.message, "error");
      } finally {
        analyzeBtn.disabled = false;
      }
    }

    document.querySelectorAll(".chip").forEach((btn) => {
      btn.addEventListener("click", () => {
        promptEl.value = btn.dataset.prompt;
        analyze(btn.dataset.prompt);
      });
    });

    analyzeBtn.addEventListener("click", () => analyze(promptEl.value));
    refreshBtn.addEventListener("click", () => {
      setStatus("");
      loadPrices();
    });

    loadPrices();
  </script>
</body>
</html>
